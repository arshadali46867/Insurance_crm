{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">


<div class="col-md-8">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>Add New Customer</h4>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success"
                >
                    Save Customer
                </button>

                <a
                    href="/customers/"
                    class="btn btn-secondary"
                >
                    Back
                </a>

            </form>

        </div>

    </div>

</div>


</div>

{% endblock %}
