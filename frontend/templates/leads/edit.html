{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

```
<div class="col-md-8">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h4>
                Edit Lead
            </h4>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-success"
                    type="submit"
                >
                    Update Lead
                </button>

                <a
                    href="/leads/"
                    class="btn btn-secondary"
                >
                    Back
                </a>

            </form>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
